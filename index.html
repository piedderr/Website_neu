<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Sheet Ansicht</title>

  <style>
    /* Seite ohne Rand und Scrollprobleme */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }

    /* Container füllt den ganzen Bildschirm */
    .sheet-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    /* iFrame passt sich komplett an */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Mobile Optimierung (optional Feintuning) */
    @media (max-width: 768px) {
      .sheet-container {
        height: 100dvh; /* bessere mobile Höhe (inkl. Safari Addressbar) */
      }
    }
  </style>
</head>

<body>
  <div class="sheet-container">
    <iframe 
      src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTVXtxZZow1L1GJjyM7rOdXbC58dMM6pgL5QdntG7_0ilbAklihYEYfIvUBp_pd6pSjggx99ZdYJzgF/pubhtml?widget=true&headers=false">
    </iframe>
  </div>
</body>
</html>
