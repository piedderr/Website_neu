<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WER IST DER STÄRKSTE?</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:20px;
    background:#f2f2f2;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.container{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:20px;
}

.exercise{
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.exercise h2{
    text-align:center;
    margin-top:0;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th, td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

th{
    background:#efefef;
}

@media (max-width: 768px){

    .container{
        grid-template-columns:1fr;
    }

    body{
        padding:10px;
    }

}

</style>
</head>
<body>

<h1>WER IST DER STÄRKSTE?</h1>

<div class="container" id="app"></div>

<script>

// DEINE GOOGLE SHEETS ID
const SHEET_ID = "16HW8wNIamfZdOGejQ_9imBdQw-AhhyQnAP9yflHtHY8";

// JSON Feed URL
const URL = `https://opensheet.elk.sh/${SHEET_ID}/Tabelle1`;

async function loadData(){

    try{

        const response = await fetch(URL);
        const data = await response.json();

        const app = document.getElementById("app");

        app.innerHTML = "";

        data.forEach(item => {

            const card = document.createElement("div");
            card.className = "exercise";

            card.innerHTML = `
                <h2>${item.Disziplin}</h2>

                <table>

                    <tr>
                        <th>Kategorie</th>
                        <td>${item.Kategorie}</td>
                    </tr>

                    <tr>
                        <th>Wert</th>
                        <td>${item.Wert}</td>
                    </tr>

                    <tr>
                        <th>Name</th>
                        <td>${item.Name}</td>
                    </tr>

                    <tr>
                        <th>Datum</th>
                        <td>${item.Datum}</td>
                    </tr>

                </table>
            `;

            app.appendChild(card);

        });

    }catch(error){

        console.error(error);

    }

}

loadData();

</script>

</body>
</html>
