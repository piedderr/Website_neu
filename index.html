<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WER IST DER STÄRKSTE?</title>

<style>

body{
    font-family: Arial;
    margin:0;
    padding:15px;
    background:#f4f4f4;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.container{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:15px;
}

.card{
    background:white;
    border-radius:12px;
    padding:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card h2{
    text-align:center;
    margin-top:0;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

td, th{
    border:1px solid #ccc;
    padding:6px;
    text-align:center;
    font-size:13px;
}

th{
    background:#eee;
}

/* MOBILE: untereinander */
@media (max-width: 768px){
    .container{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<h1>WER IST DER STÄRKSTE?</h1>

<div class="container" id="app"></div>

<script>

// DEINE GOOGLE SHEETS CSV URL
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTVXtxZZow1L1GJjyM7rOdXbC58dMM6pgL5QdntG7_0ilbAklihYEYfIvUBp_pd6pSjggx99ZdYJzgF/pub?output=csv&gid=91100154";

async function loadData(){

    const res = await fetch(URL);
    const text = await res.text();

    // CSV -> Zeilen
    const rows = text.split("\n").map(r => r.split(","));

    const app = document.getElementById("app");
    app.innerHTML = "";

    // Erste Zeile = Titel der Übungen (Kreuzheben, Pull-Ups ...)
    const titles = rows[0];

    // Jede Übung = 3 Spalten
    const blockSize = 3;

    for(let b = 0; b < titles.length; b += blockSize){

        const title = titles[b];
        if(!title) continue;

        const card = document.createElement("div");
        card.className = "card";

        let html = `<h2>${title}</h2><table>`;

        for(let r = 1; r < rows.length; r++){

            const row = rows[r];

            if(!row[b]) continue;

            html += `
                <tr>
                    <td>${row[b] || ""}</td>
                    <td>${row[b+1] || ""}</td>
                    <td>${row[b+2] || ""}</td>
                </tr>
            `;
        }

        html += "</table>";

        card.innerHTML = html;
        app.appendChild(card);
    }
}

loadData();

</script>

</body>
</html>
